<html lang="es">

<style>
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{font-family:'Hanken Grotesk',system-ui,sans-serif;background:#EDF1F7;color:#14274E;-webkit-font-smoothing:antialiased;}
  h1,h2,h3{font-family:'Bricolage Grotesque',sans-serif;}
  ::-webkit-scrollbar{width:10px;height:10px;}
  ::-webkit-scrollbar-thumb{background:#C7CEDB;border-radius:20px;border:3px solid transparent;background-clip:content-box;}
  ::-webkit-scrollbar-thumb:hover{background:#AEB6C6;background-clip:content-box;}
  button{font-family:inherit;cursor:pointer;}
  input,select,textarea{font-family:inherit;color:#14274E;}
  .shell{display:flex;min-height:100vh;background:#EDF1F7;}
  /* logo flotante: siempre visible para abrir la barra */
  .fab-logo{position:fixed;top:12px;left:12px;z-index:60;width:46px;height:46px;border-radius:14px;background:#14274E;display:flex;align-items:center;justify-content:center;border:none;cursor:pointer;box-shadow:0 8px 20px -6px rgba(20,39,78,.55);}
  .fab-logo:hover{background:#1d3563;}
  .side-backdrop{position:fixed;inset:0;background:rgba(20,39,78,.40);z-index:45;opacity:0;pointer-events:none;transition:opacity .2s;}
  .side-backdrop.show{opacity:1;pointer-events:auto;}
  /* sidebar retráctil (off-canvas) */
  .sidebar{position:fixed;left:0;top:0;height:100vh;width:264px;max-width:84vw;transform:translateX(-105%);transition:transform .22s cubic-bezier(.4,0,.2,1);background:#FFFFFF;border-right:1px solid #DEE4EE;display:flex;flex-direction:column;padding:18px 16px;overflow-y:auto;z-index:50;box-shadow:0 18px 50px -12px rgba(20,39,78,.4);}
  .sidebar.open{transform:translateX(0);}
  .brand{display:flex;align-items:center;gap:11px;padding:0 8px 4px;}
  .brand-logo{width:40px;height:40px;border-radius:13px;background:#14274E;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 6px 14px -6px rgba(20,39,78,.5);}
  .brand-name{font-family:'Bricolage Grotesque';font-weight:800;font-size:19px;letter-spacing:-.5px;line-height:1;}
  .brand-sub{font-size:11px;color:#8B94A6;font-weight:600;letter-spacing:.3px;margin-top:3px;}
  .nav{display:flex;flex-direction:column;gap:3px;margin-top:22px;}
  .nav-item{display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:13px;cursor:pointer;font-weight:600;font-size:14.5px;color:#586273;background:transparent;transition:background .15s;border:none;text-align:left;width:100%;}
  .nav-item:hover{background:#F1F4FA;}
  .nav-item.active{color:#14274E;background:#E2ECF6;}
  .side-card{margin-top:auto;background:#F1F4FA;border:1px solid #DEE4EE;border-radius:16px;padding:14px;}
  .side-card .lbl{font-size:11px;font-weight:700;letter-spacing:.6px;color:#8B94A6;text-transform:uppercase;}
  .side-actions{display:flex;flex-direction:column;gap:7px;margin-top:12px;}
  .side-btn{display:flex;align-items:center;justify-content:center;gap:7px;padding:9px;border-radius:11px;border:1px solid #DEE4EE;background:#fff;color:#14274E;font-weight:700;font-size:12.5px;}
  .side-btn:hover{background:#F1F4FA;}
  /* main */
  .main{flex:1;min-width:0;padding:64px 34px 70px;max-width:1320px;margin:0 auto;width:100%;}
  .page-head{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:16px;margin-bottom:24px;}
  .page-kicker{font-size:14px;font-weight:600;color:#8B94A6;}
  .page-title{font-weight:800;font-size:34px;letter-spacing:-1px;margin:4px 0 0;line-height:1;}
  .page-desc{font-size:15px;color:#4E5869;margin-top:10px;}
  .avatars{display:flex;}
  .avatar{width:42px;height:42px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;border:3px solid #EDF1F7;margin-left:-8px;font-family:'Bricolage Grotesque';}
  .card{background:#fff;border:1px solid #DEE4EE;border-radius:20px;padding:20px;}
  .card-title{font-weight:800;font-size:18px;margin:0 0 4px;letter-spacing:-.3px;}
  .muted{color:#8B94A6;}
  .grid{display:grid;gap:16px;}
  .stat{border-radius:20px;padding:18px 20px;color:#fff;}
  .stat .k{font-size:12.5px;font-weight:600;opacity:.85;}
  .stat .v{font-family:'Bricolage Grotesque';font-weight:800;font-size:38px;line-height:1;margin-top:8px;}
  .stat .s{font-size:12px;opacity:.8;margin-top:6px;}
  .chip{display:inline-flex;align-items:center;gap:7px;padding:8px 13px;border-radius:999px;border:1px solid #DEE4EE;background:#fff;color:#586273;font-weight:600;font-size:13px;}
  .chip.on{background:#14274E;color:#fff;border-color:#14274E;}
  .chip.sm{padding:6px 11px;font-size:12px;}
  .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
  .pill{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:700;}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 16px;border-radius:12px;border:none;font-weight:700;font-size:14px;background:#14274E;color:#fff;}
  .btn:hover{background:#1d3563;}
  .btn.ghost{background:#fff;color:#14274E;border:1px solid #DEE4EE;}
  .btn.ghost:hover{background:#F1F4FA;}
  .btn.danger{background:#fff;color:#A32C54;border:1px solid #F0C9D7;}
  .btn.danger:hover{background:#FBEDF2;}
  .btn.sm{padding:7px 12px;font-size:13px;border-radius:10px;}
  .row{display:flex;align-items:center;gap:10px;}
  .field{display:flex;flex-direction:column;gap:6px;}
  .field label{font-size:12px;font-weight:700;color:#586273;}
  .input,select.input,textarea.input{width:100%;padding:10px 12px;border-radius:11px;border:1px solid #DEE4EE;background:#fff;font-size:14px;font-weight:600;outline:none;}
  .input:focus{border-color:#7FB0E6;box-shadow:0 0 0 3px rgba(127,176,230,.25);}
  table.tbl{width:100%;border-collapse:collapse;font-size:13.5px;}
  table.tbl th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:#8B94A6;font-weight:700;padding:8px 10px;border-bottom:1px solid #EEF1F6;}
  table.tbl td{padding:10px;border-bottom:1px solid #F2F4F9;vertical-align:middle;}
  table.tbl tr:last-child td{border-bottom:none;}
  table.menu-tbl{table-layout:fixed;min-width:820px;}
  table.menu-tbl th, table.menu-tbl td{width:auto;}
  table.menu-tbl th:first-child, table.menu-tbl td:first-child{width:56px;}
  .bump{width:30px;height:30px;border-radius:9px;border:1px solid #DEE4EE;background:#fff;font-weight:800;font-size:16px;color:#14274E;line-height:1;display:inline-flex;align-items:center;justify-content:center;}
  .bump:hover{background:#F1F4FA;}
  .bar{height:9px;border-radius:999px;background:#EEF1F6;position:relative;overflow:hidden;}
  .bar > span{position:absolute;left:0;top:0;bottom:0;border-radius:999px;}
  .band{position:absolute;top:0;bottom:0;background:rgba(15,122,99,.18);}
  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(20,39,78,.42);display:flex;align-items:center;justify-content:center;padding:18px;z-index:70;}
  .modal{background:#fff;border-radius:22px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;padding:22px;box-shadow:0 30px 60px -20px rgba(20,39,78,.5);}
  .modal.wide{max-width:760px;}
  .modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
  .x{width:34px;height:34px;border-radius:10px;border:1px solid #DEE4EE;background:#fff;font-size:18px;color:#586273;display:flex;align-items:center;justify-content:center;}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#14274E;color:#fff;padding:12px 20px;border-radius:14px;font-weight:700;font-size:14px;box-shadow:0 12px 30px -10px rgba(20,39,78,.6);z-index:80;opacity:0;transition:opacity .25s, transform .25s;pointer-events:none;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-4px);}
  @media (max-width:860px){
    .main{padding:60px 15px 60px;}
    .page-title{font-size:27px;}
    .page-head{margin-bottom:18px;}
  }
</style>
</head>

const QQ_TO_INV = { prot:'Proteína', granos:'Cereales', harinas:'Cereales', tuberc:'Verduras', frutas:'Frutas', verduras:'Verduras', leche:'Lácteos', quesos:'Lácteos', especias:'Condimentos', condimentos:'Salsas' };
function syncQuincenalToInventory(){
  if(!DATA || !DATA.qqItems || !Array.isArray(DATA.inventory)) return 0;
  if(!DATA.qqSynced) DATA.qqSynced = {};
  const invSlugs = new Set(DATA.inventory.map(it=>slug(it.name)));
  let added=0;
  SEED.quincenalData.forEach(cat=>{
    const invCat = QQ_TO_INV[cat.id] || 'Cereales';
    (DATA.qqItems[cat.id]||[]).forEach(it=>{
      if((+it.qty||0)<=0) return;            // solo lo que sí compras (cantidad > 0)
      const key = slug(it.name);
      if(DATA.qqSynced[key]) return;          // ya se consideró antes (no reaparece si lo borras)
      DATA.qqSynced[key] = true;
      if(invSlugs.has(key)) return;           // ya existe en inventario → no duplicar
      DATA.inventory.push({ id:'qq_'+uid(), name:it.name, cat:invCat, qty:`${fmtNum(it.qty)} ${esc(it.unit)}`, status:'por acabarse', priority:false });
      invSlugs.add(key); added++;
    });
  });
  return added;
}

const MEALDB_RANDOM = 'https://www.themealdb.com/api/json/v1/1/random.php';
let EXT = { status:'idle', dishes:[] }; // idle | loading | ok | error
function normalizeMealDB(m){
  const ing=[];
  for(let i=1;i<=20;i++){ const n=m['strIngredient'+i], q=m['strMeasure'+i];
    if(n && n.trim()) ing.push(((q&&q.trim())?q.trim()+' ':'')+n.trim()); }
  let pasos=(m.strInstructions||'').split(/\r?\n+/).map(s=>s.trim()).filter(Boolean);
  if(pasos.length<=1) pasos=(m.strInstructions||'').split(/(?<=\.)\s+(?=[A-Z])/).map(s=>s.trim()).filter(Boolean);
  return { id:'ext_'+m.idMeal, name:m.strMeal, tipo:'mixto', area:m.strArea, category:m.strCategory, thumb:m.strMealThumb, ing, pasos };
}
async function extLoad(){
  if(EXT.status==='loading') return;
  EXT.status='loading'; render();
  try{
    const calls = Array.from({length:8},()=>fetch(MEALDB_RANDOM).then(r=>r.ok?r.json():null).catch(()=>null));
    const results = await Promise.all(calls);
    const meals = results.filter(Boolean).flatMap(d=>(d&&d.meals)?d.meals:[]);
    const seen={}; const uniq = meals.filter(m=>m&&m.idMeal&&!seen[m.idMeal]&&(seen[m.idMeal]=1));
    EXT.dishes = uniq.map(normalizeMealDB);
    EXT.status = EXT.dishes.length ? 'ok' : 'error';
  }catch(e){ console.error('TheMealDB:', e.message); EXT.status='error'; }
  render();
}

async function gtxTranslate(text){
  if(!text || !text.trim()) return text||'';
  const url='https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=es&dt=t&q='+encodeURIComponent(text);
  const r=await fetch(url); if(!r.ok) throw new Error('tr '+r.status);
  const j=await r.json(); return (j[0]||[]).map(s=>s[0]).join('');
}

/* ---------- frescura: reloj por fecha de compra ---------- */
const DAY_MS=86400000;
function shelfDaysFor(it){
  const n=(it.name||'').toLowerCase();
  const kw=[
    [/(lechuga|culantro|cilantro|cebollino|espinaca|acelga|fresa|frambuesa|mora|arándano|cereza|champi|hongo)/,3],
    [/(mel[oó]n|sand[ií]a|papaya|aguacate|banano|mango|tomate|pepino|br[oó]coli|coliflor|uva|durazno|ciruela|maracuy|guayaba|zucchini|berenjena)/,6],
    [/(manzana|pera|naranja|mandarina|lim[oó]n|toronja|zanahoria|repollo|chile|piña|kiwi|remolacha|chayote|apio|puerro)/,12],
    [/(papa|yuca|camote|batata|pl[aá]tano|ñame|auyama|ayote|cebolla|ajo|jengibre|elote)/,20],
    [/(pollo|pescado|tilapia|salm[oó]n|corvina|merluza|bacalao|trucha|dorado|pargo|sardina|at[uú]n|bistec|molida|mechad|cerdo|chuleta|costilla|pavo|camar|langostino|pulpo|calamar|mejill|almeja|ostra|res|h[ií]gado|osobuco|lomo|posta|falda|solomo|lomito)/,4],
    [/huevo/,21],
    [/(leche|yogur|natilla|crema)/,8],
    [/queso/,18],
    [/(jam[oó]n|chorizo|salchicha|tocino)/,12],
  ];
  for(const [re,d] of kw){ if(re.test(n)) return d; }
  const cat=(it.cat||'').toLowerCase();
  if(cat.includes('fruta')) return 7;
  if(cat.includes('verdura')) return 7;
  if(cat.includes('proteína')||cat.includes('proteina')) return 4;
  if(cat.includes('lácteo')||cat.includes('lacteo')) return 8;
  return 60;
}
function isPerecedero(it){ return shelfDaysFor(it)<=21 && !/(limpieza|higiene|beb[eé])/i.test(it.cat||''); }
function daysLeft(it){ if(!it.boughtAt) return null; return shelfDaysFor(it) - Math.floor((Date.now()-it.boughtAt)/DAY_MS); }
function freshState(dl){
  if(dl==null) return {k:'sin',bg:'#F1F4FA',color:'#586273',label:'Sin fecha de compra'};
  if(dl<0) return {k:'venc',bg:'#F4DCE6',color:'#98264C',label:'Vencido hace '+(-dl)+(dl===-1?' día':' días')};
  if(dl===0) return {k:'hoy',bg:'#F4DCE6',color:'#98264C',label:'¡Consúmelo HOY!'};
  if(dl===1) return {k:'urg',bg:'#FBE3D6',color:'#A24B1E',label:'Queda 1 día'};
  if(dl<=3) return {k:'pronto',bg:'#F6ECD6',color:'#87671B',label:'Quedan '+dl+' días'};
  return {k:'ok',bg:'#E1EFE9',color:'#0C5A48',label:'Quedan '+dl+' días'};
}
function frescuraItems(){
  return DATA.inventory.filter(it=> isPerecedero(it) && it.status!=='agotado')
    .map(it=>({it, dl:daysLeft(it)}))
    .sort((a,b)=>{ if(a.dl==null) return 1; if(b.dl==null) return -1; return a.dl-b.dl; });
}
function consumeSoon(){ return frescuraItems().filter(x=> x.dl!=null && x.dl<=2); }
function downloadShopping(){
  const list=DATA.inventory.filter(it=> it.status==='agotado'||it.status==='por acabarse'||it.priority);
  if(!list.length){ toast('No hay nada por comprar 🎉'); return; }
  const byCat={}; list.forEach(it=>{ (byCat[it.cat]=byCat[it.cat]||[]).push(it); });
  let txt='🛒 LISTA DE COMPRAS · '+fechaHoy()+'\n'+'='.repeat(34)+'\n\n';
  Object.keys(byCat).sort().forEach(cat=>{ txt+=cat.toUpperCase()+'\n';
    byCat[cat].forEach(it=>{ const tag=it.priority?' ★ PRIORIDAD':(it.status==='agotado'?' (agotado)':' (por acabarse)'); txt+='  [ ] '+it.name+' — '+it.qty+tag+'\n'; });
    txt+='\n'; });
  txt+='Total: '+list.length+' productos por comprar.\n';
  const blob=new Blob([txt],{type:'text/plain;charset=utf-8'});
  const url=URL.createObjectURL(blob); const a=document.createElement('a');
  a.href=url; a.download='lista-compras-'+monthKey(new Date())+'.txt'; a.click(); URL.revokeObjectURL(url);
  toast('Lista de compras descargada ✔');
}

function cloudBadge(){
  const map={ local:['#8B94A6','Solo este dispositivo','#F1F4FA'], connecting:['#2E6FB0','Conectando…','#E3EEF5'],

function viewInventario(){
  const inv = DATA.inventory;

  const filtered = inv.filter(it=>{
    if(fc!=='Todos' && it.cat!==fc) return false;

  const catChips = SEED.cats.map(c=>`<button class="chip sm ${fc===c?'on':''}" data-act="inv-cat" data-cat="${esc(c)}">${esc(c)}</button>`).join('');

  const stChips = stDefs.map(s=>`<button class="chip sm ${ff===s[0]?'on':''}" data-act="inv-filter" data-filter="${s[0]}"><span class="dot" style="background:${s[2]}"></span>${s[1]}</button>`).join('');

      <td style="font-weight:700;">${esc(it.qty)}</td>
      <td><button class="pill" style="background:${ss.bg};color:${ss.color};border:none;" data-act="inv-cycle" data-id="${it.id}"><span class="dot" style="background:${ss.dot}"></span>${ss.label}</button></td>
      <td style="text-align:right;"><button class="btn ghost sm" data-act="inv-edit" data-id="${it.id}">Editar</button></td>

/* ---------------- COMPRA QUINCENAL ---------------- */
function viewQuincenal(){
  const cards = SEED.quincenalData.map(c=>{
    const items = DATA.qqItems[c.id]||[];
    let total=0; items.forEach(it=> total+=(+it.qty||0)*(it.kgPer||0));
    const selCount = items.filter(it=>(+it.qty||0)>0).length;
    const rows = items.map(it=>{ const qty=+it.qty||0; const isUnit=it.unit==='u'||it.unit==='pq';
      return `<div class="row" style="justify-content:space-between;padding:7px 0;border-bottom:1px solid #F2F4F9;gap:6px;">
        <div style="flex:1;min-width:0;"><div style="font-weight:600;font-size:14px;${qty>0?'':'color:#8B94A6;'}">${esc(it.name)}</div>${(isUnit&&c.obj!==false&&qty>0)?`<div class="muted" style="font-size:11px;">≈ ${fmtNum(qty*it.kgPer)} ${c.unit==='L'?'L':'kg'}</div>`:''}</div>
        <div class="row" style="gap:5px;flex:none;">
          <button class="bump" data-act="qq" data-cat="${c.id}" data-id="${it.id}" data-delta="${-it.step}">−</button>
          <div style="min-width:58px;text-align:center;font-weight:800;font-size:14px;">${fmtNum(qty)} ${esc(it.unit)}</div>
          <button class="bump" data-act="qq" data-cat="${c.id}" data-id="${it.id}" data-delta="${it.step}">+</button>
          <button class="bump" data-act="qq-edit" data-cat="${c.id}" data-id="${it.id}" title="Renombrar" style="color:#2E6FB0;">✏️</button>
          <button class="bump" data-act="qq-del" data-cat="${c.id}" data-id="${it.id}" title="Eliminar" style="color:#A32C54;">🗑</button>
        </div>
      </div>`;}).join('');
    let header;
    if(c.obj!==false){
      const scale=c.max*1.18; const clamp=x=>Math.max(0,Math.min(100,x));
      const fillPct=clamp(total/scale*100), bandStart=clamp(c.min/scale*100), bandWidth=clamp(c.max/scale*100)-bandStart;
      let st;
      if(total<c.min) st={label:'Faltan '+fmtNum(c.min-total)+' '+c.unit,bg:'#F6ECD6',color:'#87671B',fill:'#C28A2A'};
      else if(total>c.max) st={label:fmtNum(total-c.max)+' '+c.unit+' por encima',bg:'#E3EEF5',color:'#2E6E8E',fill:'#2E6FB0'};
      else st={label:'✓ En el objetivo',bg:'#E1EFE9',color:'#0C5A48',fill:'#0F7A63'};
      header = `<div class="row" style="justify-content:space-between;margin-bottom:4px;gap:8px;"><h3 class="card-title" style="font-size:16px;color:${c.color}">${c.emoji||''} ${esc(c.name)}</h3>
          <span class="pill" style="background:${st.bg};color:${st.color}">${st.label}</span></div>
        <div class="muted" style="font-size:12px;">Objetivo ${c.min}–${c.max} ${c.unit} · Total ${fmtNum(Math.round(total*10)/10)} ${c.unit}</div>
        <div class="bar" style="margin:10px 0 12px;"><span class="band" style="left:${bandStart}%;width:${bandWidth}%"></span><span style="width:${fillPct}%;background:${st.fill}"></span></div>`;
    } else {
      header = `<div class="row" style="justify-content:space-between;margin-bottom:4px;gap:8px;"><h3 class="card-title" style="font-size:16px;color:${c.color}">${c.emoji||''} ${esc(c.name)}</h3>
          <span class="pill" style="background:#F1F4FA;color:#586273;">${selCount} en la lista</span></div>
        <div class="muted" style="font-size:12px;margin-bottom:12px;">Marca las cantidades de lo que compras. Sin objetivo de peso.</div>`;
    }
    return `<div class="card">${header}${rows}
      <button class="btn ghost sm" style="width:100%;margin-top:10px;color:#2E6FB0;border-color:#BFD6F0;" data-act="qq-add" data-cat="${c.id}">＋ Agregar alimento</button></div>`;}).join('');
  return pageHead('Compra quincenal', 'Lista de la quincena', 'Ajusta cantidades con − y +, renombra con ✏️, elimina con 🗑 lo que nunca compras o agrega lo que falte. Se guarda solo.',
    `<button class="btn ghost sm" data-act="qq-reco">↺ Usar cantidades recomendadas</button>`)
  + `<div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(300px,1fr));">${cards}</div>`;
}

/* ---------------- PERFILES ---------------- */
function viewPerfiles(){
  const fmtW=x=>(Math.round(x*10)/10).toString();
  const cards = SEED.family.map(f=>{
    const w = (DATA.weights[f.id]!=null && DATA.weights[f.id]!=='') ? Number(DATA.weights[f.id]) : f.weight;
    const lo=f.hMin*0.85, hi=f.hMax*1.15, clamp=x=>Math.max(3,Math.min(97,x));
    const markerPct=clamp((w-lo)/(hi-lo)*100), bandStart=clamp((f.hMin-lo)/(hi-lo)*100), bandWidth=Math.min(97-bandStart,(f.hMax-f.hMin)/(hi-lo)*100);
    let st; if(w<f.hMin) st={label:'Bajo rango',bg:'#F6ECD6',color:'#87671B'}; else if(w>f.hMax) st={label:'Sobre rango',bg:'#F4DCE6',color:'#98264C'}; else st={label:'En rango',bg:'#E1EFE9',color:'#0C5A48'};
    const bd=DATA.body[f.id]||{};
    const bodyItems=SEED.bodyFields.filter(bf=>bd[bf.key]!=null && bd[bf.key]!=='').map(bf=>{
      const u=bf.unit==='%'?'%':bf.unit==='niv'?'':' '+bf.unit; return `<div class="row" style="justify-content:space-between;padding:4px 0;font-size:13px;"><span class="muted">${esc(bf.label)}</span><b>${esc(bd[bf.key])}${u}</b></div>`;}).join('');
    return `<div class="card">
      <div class="row" style="gap:12px;margin-bottom:12px;"><div class="avatar" style="background:${f.color}">${esc(f.name[0])}</div>
        <div style="flex:1"><div style="font-weight:800;font-size:17px;">${esc(f.name)}</div><div class="muted" style="font-size:13px;">${esc(f.role)}</div></div>
        <button class="btn ghost sm" data-act="prof-edit" data-id="${f.id}">Editar</button></div>
      <div class="row" style="justify-content:space-between;margin-bottom:6px;"><div><div class="muted" style="font-size:12px;">Peso actual</div><div style="font-weight:800;font-size:22px;">${fmtW(w)} kg</div></div>
        <span class="pill" style="background:${st.bg};color:${st.color};align-self:flex-start;">${st.label}</span></div>
      <div class="bar" style="margin:8px 0 4px;"><span class="band" style="left:${bandStart}%;width:${bandWidth}%"></span><span style="left:${markerPct}%;width:3px;background:#14274E;border-radius:2px;"></span></div>
      <div class="muted" style="font-size:12px;margin-bottom:10px;">Rango saludable ${f.hMin}–${f.hMax} kg</div>
      ${bodyItems?`<div style="border-top:1px solid #F2F4F9;padding-top:8px;">${bodyItems}</div>`:''}
      ${f.needs.length?`<div style="border-top:1px solid #F2F4F9;padding-top:8px;margin-top:8px;font-size:12.5px;color:#4E5869;line-height:1.5;">${esc(f.needs.join(' · '))}</div>`:''}
    </div>`;}).join('');
  return pageHead('Perfiles familiares', 'La familia', 'Edita el peso y la composición corporal de cada quien. Se guarda automáticamente.')
  + `<div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(300px,1fr));">${cards}</div>`;
}

function dishCard(m, assigned, recipeOpen){

    m.transStatus==='loading' ? '<button class="btn ghost sm" disabled style="margin-top:6px;width:100%;">Traduciendo… ⏳</button>'

    ${isExt&&(m.area||m.category)?`<div class="muted" style="font-size:11px;margin-top:4px;">${esc([m.area,m.category].filter(Boolean).join(' · '))}</div>`:''}
    ${src.sides?`<div class="muted" style="font-size:12px;margin-top:6px;">Acompañar: ${esc(src.sides)}</div>`:''}

function modalPicker(){
  const pk=UI.picker; const slot=SEED.slots.find(s=>s.k===pk.slot); const dayObj=SEED.days.find(d=>d.k===pk.day);
  const key=pk.day+'-'+pk.slot; const assigned=planIds(key);
  const cocina = pk.cocina||'rapidas';
  const cocinasDisp = SEED.cocinas.filter(c=>c.dishes.some(d=>d.slots.includes(slot.t)));
  const chips = [`<button class="chip ${cocina==='rapidas'?'on':''}" data-act="pk-cocina" data-cocina="rapidas">⚡ Rápidas</button>`]
    .concat(cocinasDisp.map(c=>`<button class="chip ${cocina===c.id?'on':''}" data-act="pk-cocina" data-cocina="${c.id}">${c.emoji} ${esc(c.name)}</button>`)).join('');
  let cards;
  if(cocina==='extendido'){
    const esp = (SEED.especiales||[]).filter(d=>!d.slots||d.slots.includes(slot.t));
    const status = EXT.status==='loading' ? '<div class="muted">Buscando recetas internacionales en TheMealDB… ⏳</div>'

    const extCards = (EXT.status==='ok'?EXT.dishes:[]).map(m=>dishCard(m,assigned,pk.recipe)).join('');
    const espCards = esp.map(m=>dishCard(m,assigned,pk.recipe)).join('') || '<div class="muted">No hay recetas especiales para este momento.</div>';
    cards = `<div style="grid-column:1/-1;margin-bottom:2px;">${status}</div>${extCards}
      <div style="grid-column:1/-1;font-weight:800;margin:6px 0 0;">🎉 Recetas especiales de la casa</div>${espCards}`;
  } else {
    let dishes;
    if(cocina==='rapidas') dishes = catalogFor(slot.t);
    else { const c=SEED.cocinas.find(x=>x.id===cocina); dishes = c?c.dishes.filter(d=>d.slots.includes(slot.t)):[]; }
    cards = dishes.map(m=>dishCard(m,assigned,pk.recipe)).join('') || '<div class="muted" style="grid-column:1/-1;">No hay platos de esta cocina para este momento.</div>';

    : `<div class="muted" style="font-size:13px;margin-bottom:12px;">Aún no has agregado comidas a este momento. Toca ＋ en cualquier plato.</div>`;
  return `<div class="overlay" data-act="close-modal"><div class="modal wide" data-stop>
    <div class="modal-head"><div><h2 class="card-title">${esc(slot.l)} · ${esc(dayObj.full)}</h2><div class="muted" style="font-size:13px;">Agrega una o varias comidas del mundo</div></div>

  </div></div>`;
}

/* ============================================================
   EVENTOS (delegación)

document.addEventListener('click', (e)=>{
  const t = e.target.closest('[data-act]');
  if(!t) return;
  const act = t.dataset.act;
  switch(act){
    case 'nav': UI.view=t.dataset.view; UI.sideOpen=false; render(); window.scrollTo(0,0); break;
    case 'toggle-side': UI.sideOpen=!UI.sideOpen; render(); break;
    case 'export': exportData(); break;
    case 'import': document.getElementById('importFile').click(); break;
    case 'reset': doReset(); break;
    // nube
    case 'cloud-open': UI.cloudForm={url:CLOUD.url,anonKey:CLOUD.anonKey}; render(); break;
    case 'cloud-connect': cloudConnect(document.getElementById('cf-url').value, document.getElementById('cf-key').value); break;
    case 'cloud-disconnect': cloudDisconnect(); break;
    case 'cloud-copy':{ const el=document.getElementById('cf-share'); if(el){ el.select();
      (navigator.clipboard?navigator.clipboard.writeText(el.value):Promise.reject()).then(()=>toast('Enlace copiado ✔')).catch(()=>{ try{document.execCommand('copy');toast('Enlace copiado ✔');}catch(_){toast('Copia el enlace manualmente');} }); } break; }
    // inventario
    case 'inv-cat': UI.invCat=t.dataset.cat; render(); break;
    case 'inv-filter': UI.invFilter=t.dataset.filter; render(); break;
    case 'inv-cycle':{ const id=t.dataset.id; const order=['lleno','por acabarse','agotado'];
      const it=DATA.inventory.find(x=>x.id===id); if(it){ it.status=order[(order.indexOf(it.status)+1)%3]; if(it.status==='lleno') it.boughtAt=Date.now(); commit(); } break; }
    case 'fresh-bought':{ const it=DATA.inventory.find(x=>x.id===t.dataset.id); if(it){ it.boughtAt=Date.now(); if(it.status==='agotado') it.status='lleno'; commit('Reloj de frescura iniciado ⏰'); } break; }
    case 'dl-shopping': downloadShopping(); break;
    case 'inv-add': UI.invForm={id:null,name:'',cat:UI.invCat==='Todos'?'Frutas':UI.invCat,qty:'',status:'lleno',priority:false}; render(); break;
    case 'inv-edit':{ const it=DATA.inventory.find(x=>x.id===t.dataset.id); if(it){ UI.invForm={...it}; render(); } break; }
    case 'if-prio':{ // conservar lo escrito antes de re-renderizar
      const n=document.getElementById('if-name'), q=document.getElementById('if-qty'),
            c=document.getElementById('if-cat'), s=document.getElementById('if-status');
      if(n) UI.invForm.name=n.value; if(q) UI.invForm.qty=q.value;
      if(c) UI.invForm.cat=c.value; if(s) UI.invForm.status=s.value;
      UI.invForm.priority=!UI.invForm.priority; render(); break; }
    case 'if-save': saveInvForm(); break;
    case 'if-delete': if(UI.invForm.id){ DATA.inventory=DATA.inventory.filter(x=>x.id!==UI.invForm.id); UI.invForm=null; commit('Producto eliminado'); } break;
    case 'close-modal':
      // si el clic es el fondo (overlay) solo cierra al tocar directamente el fondo, no el contenido
      if(t.classList.contains('overlay') && e.target!==t) break;
      UI.invForm=null; UI.picker=null; UI.editing=null; UI.cloudForm=null; render(); break;
    // quincenal
    case 'qq':{ const cat=t.dataset.cat, id=t.dataset.id, delta=parseFloat(t.dataset.delta);
      const it=(DATA.qqItems[cat]||[]).find(x=>x.id===id); if(it){ it.qty=Math.max(0,Math.round(((+it.qty||0)+delta)*100)/100); commit(); } break; }
    case 'qq-del':{ const cat=t.dataset.cat, id=t.dataset.id; const it=(DATA.qqItems[cat]||[]).find(x=>x.id===id);
      if(it && confirm('¿Eliminar "'+it.name+'" de la lista? (Puedes recuperarlo con "Usar cantidades recomendadas").')){ DATA.qqItems[cat]=DATA.qqItems[cat].filter(x=>x.id!==id); commit('Alimento eliminado'); } break; }
    case 'qq-edit':{ const cat=t.dataset.cat, id=t.dataset.id; const it=(DATA.qqItems[cat]||[]).find(x=>x.id===id); if(!it) break;
      const nv=prompt('Nuevo nombre para el alimento:', it.name); if(nv && nv.trim()){ it.name=nv.trim(); commit('Alimento actualizado'); } break; }
    case 'qq-add':{ const cat=t.dataset.cat; const c=SEED.quincenalData.find(x=>x.id===cat); if(!c) break;
      const nm=prompt('Nombre del alimento a agregar:'); if(!nm || !nm.trim()) break;
      const unit = c.obj===false?'u':(c.unit==='L'?'L':'kg'); const step = unit==='u'?1:0.5;
      DATA.qqItems[cat]=DATA.qqItems[cat]||[]; DATA.qqItems[cat].push({id:'usr_'+Math.random().toString(36).slice(2,8), name:nm.trim(), unit, step, kgPer: unit==='u'?(c.obj===false?1:0.2):1, qty:0});
      commit('Alimento agregado ✓'); break; }
    case 'qq-reco':{ if(confirm('¿Restaurar la lista de la quincena con todos los alimentos y las cantidades recomendadas? (Repone los eliminados; no afecta inventario, presupuesto ni menú.)')){ DATA.qqItems=buildQqItems(); commit('Lista recomendada restaurada ✓'); } break; }
    // comidas
    case 'pick': UI.picker={day:t.dataset.day,slot:t.dataset.slot,cocina:'rapidas',recipe:null}; render(); break;
    case 'pk-cocina': UI.picker.cocina=t.dataset.cocina; UI.picker.recipe=null;
      if(t.dataset.cocina==='extendido' && (EXT.status==='idle'||EXT.status==='error')) extLoad(); render(); break;
    case 'ext-retry': EXT.status='idle'; EXT.dishes=[]; extLoad(); break;
    case 'ext-translate':{ const d=(EXT.dishes||[]).find(x=>x.id===t.dataset.mealid); if(!d) break;
      if(d.es){ d.viewEs=!d.viewEs; render(); break; }
      d.transStatus='loading'; render();
      translateDish(d).then(es=>{ d.es=es; d.viewEs=true; d.transStatus='done'; render(); })
        .catch(e=>{ console.error(e); d.transStatus='error'; render(); toast('No se pudo traducir, intenta de nuevo'); });
      break; }
    case 'pk-recipe': UI.picker.recipe=(UI.picker.recipe===t.dataset.mealid?null:t.dataset.mealid); render(); break;
    case 'add-meal':{ const pk=UI.picker; const key=pk.day+'-'+pk.slot; let id=t.dataset.mealid; const arr=planIds(key);
      if(id.indexOf('ext_')===0){ const src=(EXT.dishes||[]).find(d=>d.id===id);
        if(src){ const useEs=src.es&&src.viewEs; id='cm_'+Math.random().toString(36).slice(2,9);
          DATA.customMeals[id]={id, name:useEs?src.es.name:src.name, tipo:'mixto', ing:useEs?src.es.ing:(src.ing||[]), pasos:useEs?src.es.pasos:(src.pasos||[])}; } }
      if(!arr.includes(id)){ arr.push(id); DATA.plan[key]=arr; commit('Comida agregada ✓'); } break; }
    case 'remove-meal':{ const pk=UI.picker; const key=pk.day+'-'+pk.slot; DATA.plan[key]=planIds(key).filter(id=>id!==t.dataset.mealid); commit('Comida quitada'); break; }
    // porciones
    case 'person': UI.person=t.dataset.id; render(); break;
    case 'goal': UI.goal=t.dataset.goal; render(); break;
    // perfiles
    case 'prof-edit': UI.editing=t.dataset.id; render(); break;
    case 'prof-reset':{ const id=t.dataset.id; delete DATA.weights[id]; delete DATA.body[id]; commit('Perfil restablecido'); break; }
    // presupuesto
    case 'month-new': newMonth(); break;
    case 'cat-add':{ const b=DATA.budgets[DATA.budgetMonth];
      b.categories.push({id:uid('b'),name:'Nueva categoría',color:'#7C6A48',planned:0,actual:0}); commit('Categoría agregada'); break; }
    case 'cat-del':{ const b=DATA.budgets[DATA.budgetMonth]; b.categories=b.categories.filter(c=>c.id!==t.dataset.id); commit('Categoría eliminada'); break; }
  }
});

// inputs (change = al salir del campo: persiste y re-renderiza totales)
document.addEventListener('change', (e)=>{
  const t=e.target.closest('[data-act]'); if(!t) return;
  const act=t.dataset.act;
  if(act==='month-change'){ DATA.budgetMonth=t.value; commit(); }
  else if(act==='income'){ DATA.budgets[DATA.budgetMonth].income=parseFloat(t.value)||0; commit(); }
  else if(act==='bnote'){ DATA.budgets[DATA.budgetMonth].note=t.value; save(); }
  else if(act==='cat-field'){ const b=DATA.budgets[DATA.budgetMonth]; const c=b.categories.find(x=>x.id===t.dataset.id);
    if(c){ const fld=t.dataset.field; c[fld]= fld==='name'? t.value : (parseFloat(t.value)||0); commit(); } }
  else if(act==='weight-field'){ DATA.weights[t.dataset.id]=t.value; save(); }
  else if(act==='tipo-field'){ const id=t.dataset.id; DATA.body[id]={...(DATA.body[id]||{}),tipoCuerpo:t.value}; save(); }
  else if(act==='body-field'){ const id=t.dataset.id; DATA.body[id]={...(DATA.body[id]||{}),[t.dataset.key]:t.value}; save(); }
});

// importar archivo
document.getElementById('importFile').addEventListener('change', (e)=>{
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=()=>{ try{ const obj=JSON.parse(reader.result);
      if(!obj || typeof obj!=='object') throw 0;
      DATA=obj;
      // re-asegurar campos faltantes
      if(!DATA.budgets){ DATA.budgets={}; } if(!DATA.budgetMonth){ DATA.budgetMonth=monthKey(new Date()); }
      if(!DATA.budgets[DATA.budgetMonth]) DATA.budgets[DATA.budgetMonth]=defaultBudget();
      save(); render(); toast('Respaldo importado ✔');
    }catch(err){ toast('Archivo no válido'); } };
  reader.readAsText(file); e.target.value='';
});

/* ---------- acciones complejas ---------- */
function saveInvForm(){
  const f=UI.invForm;
  f.name=(document.getElementById('if-name').value||'').trim();
  f.cat=document.getElementById('if-cat').value;
  f.qty=(document.getElementById('if-qty').value||'').trim()||'—';
  f.status=document.getElementById('if-status').value;
  if(!f.name){ toast('Escribe un nombre'); return; }
  if(f.id){ const i=DATA.inventory.findIndex(x=>x.id===f.id); if(i>=0) DATA.inventory[i]={...f}; }
  else { DATA.inventory.unshift({...f,id:uid('p')}); }
  UI.invForm=null; commit('Producto guardado');
}
function newMonth(){
  // siguiente mes respecto al más reciente; copia presupuesto, reinicia gastos
  const keys=Object.keys(DATA.budgets).sort();
  const last=keys[keys.length-1]||monthKey(new Date());
  const [y,m]=last.split('-').map(Number);
  const d=new Date(y, m, 1); // m es 1-based => siguiente mes
  let nk=monthKey(d);
  while(DATA.budgets[nk]){ d.setMonth(d.getMonth()+1); nk=monthKey(d); }
  const base=DATA.budgets[last];
  DATA.budgets[nk]={ income:base.income, note:'', categories: base.categories.map(c=>({id:uid('b'),name:c.name,color:c.color,planned:c.planned,actual:0})) };
  DATA.budgetMonth=nk; commit('Mes '+monthLabel(nk)+' creado');
}
function exportData(){
  const blob=new Blob([JSON.stringify(DATA,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob); const a=document.createElement('a');
  a.href=url; a.download='familymeal-respaldo-'+monthKey(new Date())+'.json'; a.click();
  URL.revokeObjectURL(url); toast('Respaldo descargado ✔');
}
function doReset(){
  if(confirm('¿Restablecer TODOS los datos a los valores iniciales? Se perderán tus cambios guardados en este dispositivo.')){
    DATA=freshData(); save(); UI.view='inicio'; render(); toast('Datos restablecidos');
  }
}

/* ============================================================
   SINCRONIZACIÓN EN LA NUBE (Supabase) — opcional
   ============================================================ */
const CLOUD = { url:'', anonKey:'', family:'', client:null, status:'local' };
const MY_ID = uid('cli'); // identifica a este dispositivo para no "rebotar" sus propios cambios

function setCloudStatus(s){ if(CLOUD.status!==s){ CLOUD.status=s; render(); } }
const b64enc = (o)=> btoa(unescape(encodeURIComponent(JSON.stringify(o))));
const b64dec = (s)=> JSON.parse(decodeURIComponent(escape(atob(s))));

function cloudLoadConfig(){
  // Enlace de invitación: #cfg=...  (lo abre quien recibe el link)
  if(location.hash.indexOf('#cfg=')===0){
    try{ const cfg=b64dec(location.hash.slice(5));
      if(cfg.url&&cfg.anonKey&&cfg.family) localStorage.setItem('familymeal_cloud', JSON.stringify(cfg));
    }catch(e){ console.error(e); }
    try{ history.replaceState(null,'',location.pathname+location.search); }catch(e){}
  }
  try{ const c=JSON.parse(localStorage.getItem('familymeal_cloud')||'null');
    if(c){ CLOUD.url=c.url||''; CLOUD.anonKey=c.anonKey||''; CLOUD.family=c.family||''; } }catch(e){}
}
function cloudSaveConfig(){ localStorage.setItem('familymeal_cloud', JSON.stringify({url:CLOUD.url,anonKey:CLOUD.anonKey,family:CLOUD.family})); }
function cloudShareLink(){ return location.origin+location.pathname+'#cfg='+b64enc({url:CLOUD.url,anonKey:CLOUD.anonKey,family:CLOUD.family}); }

async function cloudInit(){
  cloudLoadConfig();
  if(!CLOUD.url || !CLOUD.anonKey || !CLOUD.family){ setCloudStatus('local'); return; }
  try{
    setCloudStatus('connecting');
    const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm');
    CLOUD.client = createClient(CLOUD.url, CLOUD.anonKey);
    await cloudPull();
    cloudSubscribe();
    setCloudStatus('synced');
  }catch(e){ console.error(e); setCloudStatus('offline'); }
}
async function cloudPull(){
  if(!CLOUD.client) return;
  const { data, error } = await CLOUD.client.from('spaces').select('data').eq('family',CLOUD.family).maybeSingle();
  if(error){ console.error(error); setCloudStatus('offline'); return; }
  if(data && data.data){ cloudAdopt(data.data); }   // la nube es la copia maestra al conectar
  else { await cloudPush(true); }                    // primera vez: sube lo que hay localmente
  setCloudStatus('synced');
}
function cloudAdopt(remote){
  try{ DATA = remote; ensureDataFields(); localStorage.setItem(STORE_KEY, JSON.stringify(DATA)); render(); }
  catch(e){ console.error(e); }
}
function cloudPush(immediate){
  if(!CLOUD.client) return;
  clearTimeout(cloudPush._t);
  const run = async ()=>{
    try{
      const now = new Date().toISOString();
      const payload = {...DATA, _client:MY_ID, _updatedAt:now};
      const { error } = await CLOUD.client.from('spaces').upsert({ family:CLOUD.family, data:payload, updated_at:now });
      if(error) throw error;
      setCloudStatus('synced');
    }catch(e){ console.error(e); setCloudStatus('offline'); }
  };
  if(immediate) return run();
  cloudPush._t = setTimeout(run, 600);
}
function cloudSubscribe(){
  if(!CLOUD.client) return;
  CLOUD.client.channel('sp_'+CLOUD.family)
    .on('postgres_changes', { event:'*', schema:'public', table:'spaces', filter:'family=eq.'+CLOUD.family },
      (payload)=>{ const nd = payload.new && payload.new.data; if(!nd) return;
        if(nd._client===MY_ID) return;            // ignorar mis propios cambios
        cloudAdopt(nd); toast('Actualizado por la familia ☁️'); })
    .subscribe();
}
async function cloudConnect(url, anonKey){
  CLOUD.url=(url||'').trim().replace(/\/+$/,''); CLOUD.anonKey=(anonKey||'').trim();
  if(!CLOUD.url || !CLOUD.anonKey){ toast('Faltan los datos de Supabase'); return; }
  if(!CLOUD.family) CLOUD.family = uid('fam')+uid('').slice(0,6); // espacio familiar único e impredecible
  cloudSaveConfig();
  UI.cloudForm={url:CLOUD.url,anonKey:CLOUD.anonKey};  // mantener abierto para mostrar el enlace
  await cloudInit();
  if(CLOUD.status==='synced') toast('¡Sincronización activada! ☁️');
}
function cloudDisconnect(){
  localStorage.removeItem('familymeal_cloud');
  CLOUD.url=''; CLOUD.anonKey=''; CLOUD.family=''; CLOUD.client=null;
  UI.cloudForm=null; setCloudStatus('local'); toast('Sincronización desactivada (sigue guardando en este dispositivo)');
}

/* ---------- arranque ---------- */
load();
if(syncQuincenalToInventory()>0) save();
render();
cloudInit();
</script>
