<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Familymeal · Cocina, Casa y Salud</title>

<link rel="apple-touch-icon" href="./familymeal-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{font-family:'Hanken Grotesk',system-ui,sans-serif;background:#EDF1F7;color:#14274E;-webkit-font-smoothing:antialiased;}
  h1,h2,h3{font-family:'Bricolage Grotesque',sans-serif;}
  ::-webkit-scrollbar{width:10px;height:10px;}
  ::-webkit-scrollbar-thumb{background:#C7CEDB;border-radius:20px;border:3px solid transparent;background-clip:content-box;}
  ::-webkit-scrollbar-thumb:hover{background:#AEB6C6;background-clip:content-box;}
  button{font-family:inherit;cursor:pointer;}
  input,select,textarea{font-family:inherit;color:#14274E;}
  .shell{display:flex;min-height:100vh;background:#EDF1F7;}
  /* sidebar */
  .sidebar{width:256px;flex-shrink:0;background:#FFFFFF;border-right:1px solid #DEE4EE;display:flex;flex-direction:column;padding:22px 16px;position:sticky;top:0;height:100vh;overflow-y:auto;}
  .brand{display:flex;align-items:center;gap:11px;padding:0 8px 4px;}
  .brand-logo{width:40px;height:40px;border-radius:13px;background:#14274E;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 6px 14px -6px rgba(20,39,78,.5);}
  .brand-name{font-family:'Bricolage Grotesque';font-weight:800;font-size:19px;letter-spacing:-.5px;line-height:1;}
  .brand-sub{font-size:11px;color:#8B94A6;font-weight:600;letter-spacing:.3px;margin-top:3px;}
  .nav{display:flex;flex-direction:column;gap:3px;margin-top:22px;}
  .nav-item{display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:13px;cursor:pointer;font-weight:600;font-size:14.5px;color:#586273;background:transparent;transition:background .15s;border:none;text-align:left;width:100%;}
  .nav-item:hover{background:#F1F4FA;}
  .nav-item.active{color:#14274E;background:#E2ECF6;}
  .side-card{margin-top:auto;background:#F1F4FA;border:1px solid #DEE4EE;border-radius:16px;padding:14px;}
  .side-card .lbl{font-size:11px;font-weight:700;letter-spacing:.6px;color:#8B94A6;text-transform:uppercase;}
  .side-actions{display:flex;flex-direction:column;gap:7px;margin-top:12px;}
  .side-btn{display:flex;align-items:center;justify-content:center;gap:7px;padding:9px;border-radius:11px;border:1px solid #DEE4EE;background:#fff;color:#14274E;font-weight:700;font-size:12.5px;}
  .side-btn:hover{background:#F1F4FA;}
  /* main */
  .main{flex:1;min-width:0;padding:28px 34px 70px;max-width:1320px;}
  .page-head{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:16px;margin-bottom:24px;}
  .page-kicker{font-size:14px;font-weight:600;color:#8B94A6;}
  .page-title{font-weight:800;font-size:34px;letter-spacing:-1px;margin:4px 0 0;line-height:1;}
  .page-desc{font-size:15px;color:#4E5869;margin-top:10px;}
  .avatars{display:flex;}
  .avatar{width:42px;height:42px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;border:3px solid #EDF1F7;margin-left:-8px;font-family:'Bricolage Grotesque';}
  .card{background:#fff;border:1px solid #DEE4EE;border-radius:20px;padding:20px;}
  .card-title{font-weight:800;font-size:18px;margin:0 0 4px;letter-spacing:-.3px;}
  .muted{color:#8B94A6;}
  .grid{display:grid;gap:16px;}
  .stat{border-radius:20px;padding:18px 20px;color:#fff;}
  .stat .k{font-size:12.5px;font-weight:600;opacity:.85;}
  .stat .v{font-family:'Bricolage Grotesque';font-weight:800;font-size:38px;line-height:1;margin-top:8px;}
  .stat .s{font-size:12px;opacity:.8;margin-top:6px;}
  .chip{display:inline-flex;align-items:center;gap:7px;padding:8px 13px;border-radius:999px;border:1px solid #DEE4EE;background:#fff;color:#586273;font-weight:600;font-size:13px;}
  .chip.on{background:#14274E;color:#fff;border-color:#14274E;}
  .chip.sm{padding:6px 11px;font-size:12px;}
  .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
  .pill{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:700;}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 16px;border-radius:12px;border:none;font-weight:700;font-size:14px;background:#14274E;color:#fff;}
  .btn:hover{background:#1d3563;}
  .btn.ghost{background:#fff;color:#14274E;border:1px solid #DEE4EE;}
  .btn.ghost:hover{background:#F1F4FA;}
  .btn.danger{background:#fff;color:#A32C54;border:1px solid #F0C9D7;}
  .btn.danger:hover{background:#FBEDF2;}
  .btn.sm{padding:7px 12px;font-size:13px;border-radius:10px;}
  .row{display:flex;align-items:center;gap:10px;}
  .field{display:flex;flex-direction:column;gap:6px;}
  .field label{font-size:12px;font-weight:700;color:#586273;}
  .input,select.input,textarea.input{width:100%;padding:10px 12px;border-radius:11px;border:1px solid #DEE4EE;background:#fff;font-size:14px;font-weight:600;outline:none;}
  .input:focus{border-color:#7FB0E6;box-shadow:0 0 0 3px rgba(127,176,230,.25);}
  table.tbl{width:100%;border-collapse:collapse;font-size:13.5px;}
  table.tbl th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:#8B94A6;font-weight:700;padding:8px 10px;border-bottom:1px solid #EEF1F6;}
  table.tbl td{padding:10px;border-bottom:1px solid #F2F4F9;vertical-align:middle;}
  table.tbl tr:last-child td{border-bottom:none;}
  .bump{width:30px;height:30px;border-radius:9px;border:1px solid #DEE4EE;background:#fff;font-weight:800;font-size:16px;color:#14274E;line-height:1;display:inline-flex;align-items:center;justify-content:center;}
  .bump:hover{background:#F1F4FA;}
  .bar{height:9px;border-radius:999px;background:#EEF1F6;position:relative;overflow:hidden;}
  .bar > span{position:absolute;left:0;top:0;bottom:0;border-radius:999px;}
  .band{position:absolute;top:0;bottom:0;background:rgba(15,122,99,.18);}
  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(20,39,78,.42);display:flex;align-items:center;justify-content:center;padding:18px;z-index:50;}
  .modal{background:#fff;border-radius:22px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;padding:22px;box-shadow:0 30px 60px -20px rgba(20,39,78,.5);}
  .modal.wide{max-width:760px;}
  .modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
  .x{width:34px;height:34px;border-radius:10px;border:1px solid #DEE4EE;background:#fff;font-size:18px;color:#586273;display:flex;align-items:center;justify-content:center;}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#14274E;color:#fff;padding:12px 20px;border-radius:14px;font-weight:700;font-size:14px;box-shadow:0 12px 30px -10px rgba(20,39,78,.6);z-index:80;opacity:0;transition:opacity .25s, transform .25s;pointer-events:none;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-4px);}
  .menu-btn{display:none;}
  @media (max-width:860px){
    .shell{flex-direction:column;}
    .sidebar{width:100%;height:auto;position:relative;border-right:none;border-bottom:1px solid #DEE4EE;padding:14px;}
    .sidebar.collapsed .nav, .sidebar.collapsed .side-card{display:none;}
    .nav{flex-direction:row;flex-wrap:wrap;}
    .nav-item{width:auto;}
    .side-card{margin-top:14px;}
    .main{padding:18px 16px 60px;}
    .page-title{font-size:27px;}
    .menu-btn{display:flex;}
  }
</style>
</head>

function freshData(){
  const m = monthKey(new Date());
  const budgets = {}; budgets[m] = defaultBudget();
  return {
    v:1,
    inventory: SEED.inventory.map(x=>({...x})),
    qq: defaultQQ(),
    plan: defaultPlan(),
    weights:{}, body:{},
    budgets, budgetMonth: m,
  };
}
function defaultQQ(){ const o={}; SEED.quincenalData.forEach(c=>c.items.forEach((it,i)=>{o[c.id+'-'+i]=it.def;})); return o; }
function defaultPlan(){ return {
  'Lun-desayuno':'d_perico','Lun-m1':'s_fruta','Lun-almuerzo':'l_pollo_horno','Lun-m2':'s_yogurt','Lun-cena':'c_arepas',

  'Jue-desayuno':'d_reina','Jue-m1':'s_queso_uvas','Jue-almuerzo':'l_pollo_guisado','Jue-m2':'s_avena','Jue-cena':'c_pabellon',
  'Vie-desayuno':'d_tostadas','Vie-m1':'s_fruta','Vie-almuerzo':'l_pescado','Vie-m2':'s_brownies','Vie-cena':'c_cachapas',
  'Sáb-desayuno':'d_empanadas','Sáb-m1':'s_cereal','Sáb-almuerzo':'l_costillas','Sáb-m2':'s_arroz_leche','Sáb-cena':'c_parrilla',
  'Dom-desayuno':'d_pan_perico','Dom-m1':'s_mini_arepa','Dom-almuerzo':'l_bistec','Dom-m2':'s_churchill','Dom-cena':'c_sancocho',
};}

function ensureDataFields(){
  if(!DATA || typeof DATA!=='object') DATA = freshData();
  if(!DATA.inventory) DATA.inventory = SEED.inventory.map(x=>({...x}));
  if(!DATA.qq) DATA.qq = defaultQQ();
  if(!DATA.plan) DATA.plan = defaultPlan();
  if(!DATA.weights) DATA.weights={}; if(!DATA.body) DATA.body={};
  if(!DATA.budgets) DATA.budgets={};
  if(!DATA.budgetMonth || !DATA.budgets[DATA.budgetMonth]){
    const m = monthKey(new Date());
    if(!DATA.budgets[m]) DATA.budgets[m]=defaultBudget();
    DATA.budgetMonth = m;
  }
}
function load(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(!raw){ DATA = freshData(); save(); return; }
    DATA = JSON.parse(raw);
    ensureDataFields();
  }catch(e){ console.error(e); DATA = freshData(); }
}
function save(){
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(DATA)); }
  catch(e){ console.error(e); toast('No se pudo guardar'); }
  cloudPush();   // si la sincronización está activa, sube los cambios
}
function commit(msg){ save(); render(); if(msg) toast(msg); }

function allMeals(){ return [...SEED.desayunos,...SEED.meriendas,...SEED.almuerzos,...SEED.cenas]; }
function mealById(id){ return allMeals().find(m=>m.id===id); }
function catalogFor(t){ return t==='desayuno'?SEED.desayunos : t==='merienda'?SEED.meriendas : t==='almuerzo'?SEED.almuerzos : SEED.cenas; }
function statusStyle(s){
  if(s==='lleno') return {bg:'#E1EFE9',color:'#0C5A48',dot:'#0F7A63',label:'Lleno'};
  if(s==='por acabarse') return {bg:'#F6ECD6',color:'#87671B',dot:'#C28A2A',label:'Por acabarse'};
  return {bg:'#F4DCE6',color:'#98264C',dot:'#A32C54',label:'Agotado'};
}

}

function todayKey(){ const idx=(new Date().getDay()+6)%7; return SEED.days[idx].k; }
function todayFull(){ const d=SEED.days.find(x=>x.k===todayKey()); return d?d.full:''; }

function main(){
  switch(UI.view){
    case 'inicio': return viewInicio();
    case 'presupuesto': return viewPresupuesto();
    case 'inventario': return viewInventario();
    case 'quincenal': return viewQuincenal();
    case 'comidas': return viewComidas();
    case 'porciones': return viewPorciones();
    case 'frescura': return viewFrescura();
    case 'perfiles': return viewPerfiles();
  }
  return '';
}

/* ---------------- PRESUPUESTOS ---------------- */
function viewPresupuesto(){
  const months = Object.keys(DATA.budgets).sort();
  const cur = DATA.budgetMonth;
  const b = DATA.budgets[cur];
  const planned = b.categories.reduce((a,c)=>a+(+c.planned||0),0);
  const actual = b.categories.reduce((a,c)=>a+(+c.actual||0),0);
  const income = +b.income||0;
  const balPlan = income - planned;
  const balReal = income - actual;

  const opts = months.map(m=>`<option value="${m}" ${m===cur?'selected':''}>${esc(monthLabel(m))}</option>`).join('');
  const right = `<div class="row" style="gap:8px;flex-wrap:wrap;">
    <select class="input" data-act="month-change" style="width:auto;min-width:160px;font-weight:700;">${opts}</select>
    <button class="btn sm" data-act="month-new">+ Nuevo mes</button>
  </div>`;

  const rows = b.categories.map(c=>{
    const diff=(+c.planned||0)-(+c.actual||0);
    const over=(+c.actual||0)>(+c.planned||0);
    const pct = c.planned>0 ? Math.min(100, (c.actual/c.planned)*100) : (c.actual>0?100:0);
    return `<tr>
      <td><div class="row"><span class="dot" style="background:${c.color||'#7C6A48'}"></span>
        <input class="input" style="border:none;background:transparent;padding:6px 4px;font-weight:700;" value="${esc(c.name)}" data-act="cat-field" data-id="${c.id}" data-field="name"></div></td>
      <td style="width:140px;"><input class="input" type="number" min="0" step="1000" value="${+c.planned||0}" data-act="cat-field" data-id="${c.id}" data-field="planned"></td>
      <td style="width:140px;"><input class="input" type="number" min="0" step="1000" value="${+c.actual||0}" data-act="cat-field" data-id="${c.id}" data-field="actual"></td>
      <td style="width:150px;">
        <div class="bar" style="margin-bottom:5px;"><span style="width:${pct}%;background:${over?'#A32C54':c.color||'#0F7A63'}"></span></div>
        <div style="font-size:12px;font-weight:700;color:${over?'#A32C54':diff<0?'#A32C54':'#0C5A48'}">${over?'+'+fmtCRC(Math.abs(diff))+' sobre':fmtCRC(diff)+' libre'}</div>
      </td>
      <td style="width:40px;text-align:right;"><button class="x" data-act="cat-del" data-id="${c.id}" title="Eliminar">✕</button></td>
    </tr>`;
  }).join('');

  return pageHead('Presupuestos', monthLabel(cur), 'Define cuánto planeas gastar y registra lo que realmente gastaste. Cada mes se guarda por separado.', right)
  + `<div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(190px,1fr));margin-bottom:18px;">
      <div class="stat" style="background:#0F7A63"><div class="k">Ingreso del mes</div><div class="v" style="font-size:26px;">${fmtCRC(income)}</div></div>
      <div class="stat" style="background:#14274E"><div class="k">Presupuestado</div><div class="v" style="font-size:26px;">${fmtCRC(planned)}</div><div class="s">${balPlan<0?fmtCRC(Math.abs(balPlan))+' sobre el ingreso':fmtCRC(balPlan)+' sin asignar'}</div></div>
      <div class="stat" style="background:#2E6FB0"><div class="k">Gastado real</div><div class="v" style="font-size:26px;">${fmtCRC(actual)}</div><div class="s">${planned>0?Math.round(actual/planned*100):0}% de lo presupuestado</div></div>
      <div class="stat" style="background:${balReal<0?'#A32C54':'#1d3563'}"><div class="k">Saldo real</div><div class="v" style="font-size:26px;">${fmtCRC(balReal)}</div><div class="s">${balReal<0?'Te pasaste del ingreso':'Disponible este mes'}</div></div>
    </div>
    <div class="card" style="margin-bottom:16px;">
      <div class="row" style="flex-wrap:wrap;gap:16px;">
        <div class="field" style="flex:1;min-width:200px;"><label>Ingreso / dinero disponible del mes</label>
          <input class="input" type="number" min="0" step="1000" value="${income}" data-act="income"></div>
        <div class="field" style="flex:2;min-width:240px;"><label>Nota del mes (opcional)</label>
          <input class="input" value="${esc(b.note||'')}" placeholder="Ej. mes con cumpleaños, gasto extra en…" data-act="bnote"></div>
      </div>
    </div>
    <div class="card">
      <div class="row" style="justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:8px;">
        <h3 class="card-title">Categorías de gasto</h3>
        <button class="btn sm" data-act="cat-add">+ Agregar categoría</button>
      </div>
      <div style="overflow-x:auto;"><table class="tbl"><thead><tr>
        <th>Categoría</th><th>Presupuesto</th><th>Gastado</th><th>Estado</th><th></th>
      </tr></thead><tbody>${rows||'<tr><td colspan="5" class="muted" style="padding:20px;text-align:center;">Sin categorías. Agrega una para empezar.</td></tr>'}</tbody>
      <tfoot><tr style="font-weight:800;">
        <td style="padding-top:14px;">TOTAL</td>
        <td style="padding-top:14px;">${fmtCRC(planned)}</td>
        <td style="padding-top:14px;">${fmtCRC(actual)}</td>
        <td style="padding-top:14px;" colspan="2"></td>
      </tr></tfoot></table></div>
    </div>`;
}

    if(fc!=='Todos' && it.cat!==fc) return false;

/* ---------------- COMPRA QUINCENAL ---------------- */
function viewQuincenal(){
  const qq=DATA.qq;
  const cards = SEED.quincenalData.map(c=>{
    let total=0;
    const items = c.items.map((it,i)=>{ const key=c.id+'-'+i; const qty=qq[key]!=null?qq[key]:it.def; total+=qty*it.kgPer;
      const isUnit=it.unit==='u'||it.unit==='pq';
      return `<div class="row" style="justify-content:space-between;padding:7px 0;border-bottom:1px solid #F2F4F9;">
        <div style="flex:1"><div style="font-weight:600;font-size:14px;">${esc(it.name)}</div>${isUnit?`<div class="muted" style="font-size:11px;">≈ ${fmtNum(qty*it.kgPer)} ${c.unit==='L'?'L':'kg'}</div>`:''}</div>
        <div class="row" style="gap:6px;"><button class="bump" data-act="qq" data-key="${key}" data-delta="${-it.step}">−</button>
          <div style="min-width:64px;text-align:center;font-weight:800;font-size:14px;">${fmtNum(qty)} ${it.unit}</div>
          <button class="bump" data-act="qq" data-key="${key}" data-delta="${it.step}">+</button></div>
      </div>`;}).join('');
    const scale=c.max*1.18; const clamp=x=>Math.max(0,Math.min(100,x));
    const fillPct=clamp(total/scale*100), bandStart=clamp(c.min/scale*100), bandWidth=clamp(c.max/scale*100)-bandStart;
    let st;
    if(total<c.min) st={label:'Faltan '+fmtNum(c.min-total)+' '+c.unit,bg:'#F6ECD6',color:'#87671B',fill:'#C28A2A'};
    else if(total>c.max) st={label:fmtNum(total-c.max)+' '+c.unit+' por encima',bg:'#E3EEF5',color:'#2E6E8E',fill:'#2E6FB0'};
    else st={label:'✓ En el objetivo',bg:'#E1EFE9',color:'#0C5A48',fill:'#0F7A63'};
    return `<div class="card">
      <div class="row" style="justify-content:space-between;margin-bottom:4px;"><h3 class="card-title" style="font-size:16px;color:${c.color}">${esc(c.name)}</h3>
        <span class="pill" style="background:${st.bg};color:${st.color}">${st.label}</span></div>
      <div class="muted" style="font-size:12px;">Objetivo ${c.min}–${c.max} ${c.unit} · Total ${fmtNum(Math.round(total*10)/10)} ${c.unit}</div>
      <div class="bar" style="margin:10px 0 14px;"><span class="band" style="left:${bandStart}%;width:${bandWidth}%"></span><span style="width:${fillPct}%;background:${st.fill}"></span></div>
      ${items}</div>`;}).join('');
  return pageHead('Compra quincenal', 'Lista de la quincena', 'Ajusta las cantidades con los botones. Se guardan automáticamente.',
    `<button class="btn ghost sm" data-act="qq-reco">↺ Usar cantidades recomendadas</button>`)
  + `<div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(300px,1fr));">${cards}</div>`;
}

      <div class="row" style="justify-content:space-between;margin-bottom:6px;"><div><div class="muted" style="font-size:12px;">Peso actual</div><div style="font-weight:800;font-size:22px;">${fmtW(w)} kg</div></div>
        <span class="pill" style="background:${st.bg};color:${st.color};align-self:flex-start;">${st.label}</span></div>
      <div class="bar" style="margin:8px 0 4px;"><span class="band" style="left:${bandStart}%;width:${bandWidth}%"></span><span style="left:${markerPct}%;width:3px;background:#14274E;border-radius:2px;"></span></div>
      <div class="muted" style="font-size:12px;margin-bottom:10px;">Rango saludable ${f.hMin}–${f.hMax} kg</div>
      ${bodyItems?`<div style="border-top:1px solid #F2F4F9;padding-top:8px;">${bodyItems}</div>`:''}
      ${f.needs.length?`<div style="border-top:1px solid #F2F4F9;padding-top:8px;margin-top:8px;font-size:12.5px;color:#4E5869;line-height:1.5;">${esc(f.needs.join(' · '))}</div>`:''}
    </div>`;}).join('');
  return pageHead('Perfiles familiares', 'La familia', 'Edita el peso y la composición corporal de cada quien. Se guarda automáticamente.')
  + `<div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(300px,1fr));">${cards}</div>`;
}

/* ============================================================
   MODALES
   ============================================================ */
function modals(){
  let html='';
  if(UI.invForm) html += modalInvForm();
  if(UI.picker) html += modalPicker();
  if(UI.editing) html += modalProfile();
  if(UI.cloudForm) html += modalCloud();
  return html;
}
function modalCloud(){
  const connected = CLOUD.status==='synced' || (CLOUD.url && CLOUD.anonKey && CLOUD.family);
  const f=UI.cloudForm;
  const share = (CLOUD.url&&CLOUD.anonKey&&CLOUD.family) ? cloudShareLink() : '';
  return `<div class="overlay" data-act="close-modal"><div class="modal" data-stop>
    <div class="modal-head"><h2 class="card-title">☁️ Sincronización familiar</h2><button class="x" data-act="close-modal">✕</button></div>
    <div class="muted" style="font-size:13px;line-height:1.5;margin-bottom:14px;">
      Conecta la app a tu base de datos gratuita de <b>Supabase</b> para que tú y tu esposo vean los mismos datos en todos los dispositivos.
      Pega aquí los dos valores que te da Supabase (Project URL y la llave <b>anon public</b>).</div>
    <div class="field" style="margin-bottom:10px;"><label>Project URL</label>
      <input class="input" id="cf-url" value="${esc(f.url||'')}" placeholder="https://xxxx.supabase.co"></div>
    <div class="field" style="margin-bottom:14px;"><label>Llave anon public</label>
      <input class="input" id="cf-key" value="${esc(f.anonKey||'')}" placeholder="eyJhbGciOi..."></div>
    ${connected&&share?`<div class="card" style="background:#E1EFE9;border-color:#BFE0D4;padding:12px;margin-bottom:14px;">
      <div style="font-weight:800;color:#0C5A48;font-size:13px;margin-bottom:6px;">✓ Conectado · espacio familiar listo</div>
      <div class="muted" style="font-size:12px;margin-bottom:8px;">Envía este enlace a tu esposo. Al abrirlo en su celular/compu, queda conectado al mismo espacio.</div>
      <input class="input" id="cf-share" readonly value="${esc(share)}" style="font-size:11px;background:#fff;">
      <button class="btn sm" data-act="cloud-copy" style="margin-top:8px;width:100%">📋 Copiar enlace para compartir</button>
    </div>`:''}
    <div class="row" style="justify-content:space-between;">
      ${connected?`<button class="btn danger" data-act="cloud-disconnect">Desconectar</button>`:'<span></span>'}
      <button class="btn" data-act="cloud-connect">${connected?'Reconectar':'Conectar'}</button>
    </div>
  </div></div>`;
}
function modalInvForm(){
  const f=UI.invForm; const isEdit=!!f.id;
  const catOpts=SEED.cats.filter(c=>c!=='Todos').map(c=>`<option ${c===f.cat?'selected':''}>${esc(c)}</option>`).join('');
  const stOpts=['lleno','por acabarse','agotado'].map(s=>`<option ${s===f.status?'selected':''}>${s}</option>`).join('');
  return `<div class="overlay" data-act="close-modal"><div class="modal" data-stop>
    <div class="modal-head"><h2 class="card-title">${isEdit?'Editar producto':'Agregar producto'}</h2><button class="x" data-act="close-modal">✕</button></div>
    <div class="field" style="margin-bottom:12px;"><label>Nombre</label><input class="input" id="if-name" value="${esc(f.name)}" placeholder="Ej. Arroz blanco"></div>
    <div class="row" style="gap:12px;margin-bottom:12px;flex-wrap:wrap;">
      <div class="field" style="flex:1;min-width:140px;"><label>Categoría</label><select class="input" id="if-cat">${catOpts}</select></div>
      <div class="field" style="flex:1;min-width:140px;"><label>Cantidad</label><input class="input" id="if-qty" value="${esc(f.qty)}" placeholder="Ej. 2 kg"></div>
    </div>
    <div class="row" style="gap:12px;margin-bottom:14px;flex-wrap:wrap;">
      <div class="field" style="flex:1;min-width:140px;"><label>Estado</label><select class="input" id="if-status">${stOpts}</select></div>
      <div class="field" style="flex:1;min-width:140px;"><label>Prioridad</label><button class="btn ${f.priority?'':'ghost'}" id="if-prio" data-act="if-prio" style="width:100%">${f.priority?'★ Prioritario':'Marcar prioridad'}</button></div>
    </div>
    <div class="row" style="justify-content:space-between;">
      ${isEdit?`<button class="btn danger" data-act="if-delete">Eliminar</button>`:'<span></span>'}
      <div class="row" style="gap:8px;"><button class="btn ghost" data-act="close-modal">Cancelar</button><button class="btn" data-act="if-save">Guardar</button></div>
    </div>
  </div></div>`;
}
function modalPicker(){
  const pk=UI.picker; const slot=SEED.slots.find(s=>s.k===pk.slot); const dayObj=SEED.days.find(d=>d.k===pk.day);
  const curId=DATA.plan[pk.day+'-'+pk.slot];
  const cards = catalogFor(slot.t).map(m=>`<button class="card" style="text-align:left;border-color:${m.id===curId?'#0F7A63':'#DEE4EE'};background:${m.id===curId?'#E2ECF6':'#fff'};padding:12px;" data-act="choose" data-mealid="${m.id}">
    <div class="row" style="gap:8px;font-weight:700;"><span class="dot" style="background:${SEED.tipoColor[m.tipo]}"></span>${esc(m.name)}</div>
    <div class="muted" style="font-size:12px;margin-top:3px;">${esc(m.sides||'')}</div></button>`).join('');
  return `<div class="overlay" data-act="close-modal"><div class="modal wide" data-stop>
    <div class="modal-head"><div><h2 class="card-title">${esc(slot.l)} · ${esc(dayObj.full)}</h2><div class="muted" style="font-size:13px;">Elige una comida</div></div>
      <div class="row" style="gap:8px;">${curId?'<button class="btn danger sm" data-act="clear-cell">Quitar</button>':''}<button class="x" data-act="close-modal">✕</button></div></div>
    <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(200px,1fr));">${cards}</div>
  </div></div>`;
}
function modalProfile(){
  const f=SEED.family.find(x=>x.id===UI.editing); const bd=DATA.body[f.id]||{};
  const wv = DATA.weights[f.id]!=null?DATA.weights[f.id]:f.weight;
  const fields = SEED.bodyFields.map(bf=>`<div class="field"><label>${esc(bf.label)} (${esc(bf.unit)})</label>
    <input class="input" type="number" step="0.1" value="${bd[bf.key]!=null?esc(bd[bf.key]):''}" data-act="body-field" data-id="${f.id}" data-key="${bf.key}"></div>`).join('');
  const tipoOpts = SEED.tipoCuerpoOpts.map(t=>`<option ${t===(bd.tipoCuerpo||'—')?'selected':''}>${esc(t)}</option>`).join('');
  return `<div class="overlay" data-act="close-modal"><div class="modal wide" data-stop>
    <div class="modal-head"><div class="row" style="gap:10px;"><div class="avatar" style="background:${f.color}">${esc(f.name[0])}</div><h2 class="card-title">${esc(f.name)}</h2></div><button class="x" data-act="close-modal">✕</button></div>
    <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(160px,1fr));margin-bottom:12px;">
      <div class="field"><label>Peso (kg)</label><input class="input" type="number" step="0.1" value="${esc(wv)}" data-act="weight-field" data-id="${f.id}"></div>
      <div class="field"><label>Tipo de cuerpo</label><select class="input" data-act="tipo-field" data-id="${f.id}">${tipoOpts}</select></div>
      ${fields}
    </div>
    <div class="row" style="justify-content:space-between;"><button class="btn danger" data-act="prof-reset" data-id="${f.id}">Restablecer</button>
      <button class="btn" data-act="close-modal">Listo</button></div>
  </div></div>`;
}

/* ============================================================
   EVENTOS (delegación)
   ============================================================ */
document.addEventListener('click', (e)=>{
  const t = e.target.closest('[data-act]');
  if(!t) return;
  const act = t.dataset.act;
  switch(act){
    case 'nav': UI.view=t.dataset.view; UI.sideOpen=false; render(); window.scrollTo(0,0); break;
    case 'toggle-side': UI.sideOpen=!UI.sideOpen; render(); break;
    case 'export': exportData(); break;
    case 'import': document.getElementById('importFile').click(); break;
    case 'reset': doReset(); break;
    // nube
    case 'cloud-open': UI.cloudForm={url:CLOUD.url,anonKey:CLOUD.anonKey}; render(); break;
    case 'cloud-connect': cloudConnect(document.getElementById('cf-url').value, document.getElementById('cf-key').value); break;
    case 'cloud-disconnect': cloudDisconnect(); break;
    case 'cloud-copy':{ const el=document.getElementById('cf-share'); if(el){ el.select();
      (navigator.clipboard?navigator.clipboard.writeText(el.value):Promise.reject()).then(()=>toast('Enlace copiado ✔')).catch(()=>{ try{document.execCommand('copy');toast('Enlace copiado ✔');}catch(_){toast('Copia el enlace manualmente');} }); } break; }
    // inventario
    case 'inv-cat': UI.invCat=t.dataset.cat; render(); break;
    case 'inv-filter': UI.invFilter=t.dataset.filter; render(); break;
    case 'inv-cycle':{ const id=t.dataset.id; const order=['lleno','por acabarse','agotado'];
      const it=DATA.inventory.find(x=>x.id===id); if(it){ it.status=order[(order.indexOf(it.status)+1)%3]; commit(); } break; }
    case 'inv-add': UI.invForm={id:null,name:'',cat:UI.invCat==='Todos'?'Frutas':UI.invCat,qty:'',status:'lleno',priority:false}; render(); break;
    case 'inv-edit':{ const it=DATA.inventory.find(x=>x.id===t.dataset.id); if(it){ UI.invForm={...it}; render(); } break; }
    case 'if-prio':{ // conservar lo escrito antes de re-renderizar
      const n=document.getElementById('if-name'), q=document.getElementById('if-qty'),
            c=document.getElementById('if-cat'), s=document.getElementById('if-status');
      if(n) UI.invForm.name=n.value; if(q) UI.invForm.qty=q.value;
      if(c) UI.invForm.cat=c.value; if(s) UI.invForm.status=s.value;
      UI.invForm.priority=!UI.invForm.priority; render(); break; }
    case 'if-save': saveInvForm(); break;
    case 'if-delete': if(UI.invForm.id){ DATA.inventory=DATA.inventory.filter(x=>x.id!==UI.invForm.id); UI.invForm=null; commit('Producto eliminado'); } break;
    case 'close-modal':
      // si el clic es el fondo (overlay) solo cierra al tocar directamente el fondo, no el contenido
      if(t.classList.contains('overlay') && e.target!==t) break;
      UI.invForm=null; UI.picker=null; UI.editing=null; UI.cloudForm=null; render(); break;
    // quincenal
    case 'qq':{ const key=t.dataset.key, delta=parseFloat(t.dataset.delta);
      const cur=DATA.qq[key]||0; DATA.qq[key]=Math.max(0,Math.round((cur+delta)*100)/100); commit(); break; }
    case 'qq-reco':{ if(confirm('¿Reemplazar las cantidades de la compra quincenal por las recomendadas para tu familia? (No afecta inventario, presupuesto ni menú.)')){ DATA.qq=defaultQQ(); commit('Cantidades recomendadas aplicadas ✓'); } break; }
    // comidas
    case 'pick': UI.picker={day:t.dataset.day,slot:t.dataset.slot}; render(); break;
    case 'choose':{ const pk=UI.picker; DATA.plan[pk.day+'-'+pk.slot]=t.dataset.mealid; UI.picker=null; commit('Comida actualizada'); break; }
    case 'clear-cell':{ const pk=UI.picker; DATA.plan[pk.day+'-'+pk.slot]=null; UI.picker=null; commit('Comida quitada'); break; }
    // porciones
    case 'person': UI.person=t.dataset.id; render(); break;
    case 'goal': UI.goal=t.dataset.goal; render(); break;
    // perfiles
    case 'prof-edit': UI.editing=t.dataset.id; render(); break;
    case 'prof-reset':{ const id=t.dataset.id; delete DATA.weights[id]; delete DATA.body[id]; commit('Perfil restablecido'); break; }
    // presupuesto
    case 'month-new': newMonth(); break;
    case 'cat-add':{ const b=DATA.budgets[DATA.budgetMonth];
      b.categories.push({id:uid('b'),name:'Nueva categoría',color:'#7C6A48',planned:0,actual:0}); commit('Categoría agregada'); break; }
    case 'cat-del':{ const b=DATA.budgets[DATA.budgetMonth]; b.categories=b.categories.filter(c=>c.id!==t.dataset.id); commit('Categoría eliminada'); break; }
  }
});

// inputs (change = al salir del campo: persiste y re-renderiza totales)
document.addEventListener('change', (e)=>{
  const t=e.target.closest('[data-act]'); if(!t) return;
  const act=t.dataset.act;
  if(act==='month-change'){ DATA.budgetMonth=t.value; commit(); }
  else if(act==='income'){ DATA.budgets[DATA.budgetMonth].income=parseFloat(t.value)||0; commit(); }
  else if(act==='bnote'){ DATA.budgets[DATA.budgetMonth].note=t.value; save(); }
  else if(act==='cat-field'){ const b=DATA.budgets[DATA.budgetMonth]; const c=b.categories.find(x=>x.id===t.dataset.id);
    if(c){ const fld=t.dataset.field; c[fld]= fld==='name'? t.value : (parseFloat(t.value)||0); commit(); } }
  else if(act==='weight-field'){ DATA.weights[t.dataset.id]=t.value; save(); }
  else if(act==='tipo-field'){ const id=t.dataset.id; DATA.body[id]={...(DATA.body[id]||{}),tipoCuerpo:t.value}; save(); }
  else if(act==='body-field'){ const id=t.dataset.id; DATA.body[id]={...(DATA.body[id]||{}),[t.dataset.key]:t.value}; save(); }
});

// importar archivo
document.getElementById('importFile').addEventListener('change', (e)=>{
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=()=>{ try{ const obj=JSON.parse(reader.result);
      if(!obj || typeof obj!=='object') throw 0;
      DATA=obj;
      // re-asegurar campos faltantes
      if(!DATA.budgets){ DATA.budgets={}; } if(!DATA.budgetMonth){ DATA.budgetMonth=monthKey(new Date()); }
      if(!DATA.budgets[DATA.budgetMonth]) DATA.budgets[DATA.budgetMonth]=defaultBudget();
      save(); render(); toast('Respaldo importado ✔');
    }catch(err){ toast('Archivo no válido'); } };
  reader.readAsText(file); e.target.value='';
});

/* ---------- acciones complejas ---------- */
function saveInvForm(){
  const f=UI.invForm;
  f.name=(document.getElementById('if-name').value||'').trim();
  f.cat=document.getElementById('if-cat').value;
  f.qty=(document.getElementById('if-qty').value||'').trim()||'—';
  f.status=document.getElementById('if-status').value;
  if(!f.name){ toast('Escribe un nombre'); return; }
  if(f.id){ const i=DATA.inventory.findIndex(x=>x.id===f.id); if(i>=0) DATA.inventory[i]={...f}; }
  else { DATA.inventory.unshift({...f,id:uid('p')}); }
  UI.invForm=null; commit('Producto guardado');
}
function newMonth(){
  // siguiente mes respecto al más reciente; copia presupuesto, reinicia gastos
  const keys=Object.keys(DATA.budgets).sort();
  const last=keys[keys.length-1]||monthKey(new Date());
  const [y,m]=last.split('-').map(Number);
  const d=new Date(y, m, 1); // m es 1-based => siguiente mes
  let nk=monthKey(d);
  while(DATA.budgets[nk]){ d.setMonth(d.getMonth()+1); nk=monthKey(d); }
  const base=DATA.budgets[last];
  DATA.budgets[nk]={ income:base.income, note:'', categories: base.categories.map(c=>({id:uid('b'),name:c.name,color:c.color,planned:c.planned,actual:0})) };
  DATA.budgetMonth=nk; commit('Mes '+monthLabel(nk)+' creado');
}
function exportData(){
  const blob=new Blob([JSON.stringify(DATA,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob); const a=document.createElement('a');
  a.href=url; a.download='familymeal-respaldo-'+monthKey(new Date())+'.json'; a.click();
  URL.revokeObjectURL(url); toast('Respaldo descargado ✔');
}
function doReset(){
  if(confirm('¿Restablecer TODOS los datos a los valores iniciales? Se perderán tus cambios guardados en este dispositivo.')){
    DATA=freshData(); save(); UI.view='inicio'; render(); toast('Datos restablecidos');
  }
}

/* ============================================================
   SINCRONIZACIÓN EN LA NUBE (Supabase) — opcional
   ============================================================ */
const CLOUD = { url:'', anonKey:'', family:'', client:null, status:'local' };
const MY_ID = uid('cli'); // identifica a este dispositivo para no "rebotar" sus propios cambios

function setCloudStatus(s){ if(CLOUD.status!==s){ CLOUD.status=s; render(); } }
const b64enc = (o)=> btoa(unescape(encodeURIComponent(JSON.stringify(o))));
const b64dec = (s)=> JSON.parse(decodeURIComponent(escape(atob(s))));

function cloudLoadConfig(){
  // Enlace de invitación: #cfg=...  (lo abre quien recibe el link)
  if(location.hash.indexOf('#cfg=')===0){
    try{ const cfg=b64dec(location.hash.slice(5));
      if(cfg.url&&cfg.anonKey&&cfg.family) localStorage.setItem('familymeal_cloud', JSON.stringify(cfg));
    }catch(e){ console.error(e); }
    try{ history.replaceState(null,'',location.pathname+location.search); }catch(e){}
  }
  try{ const c=JSON.parse(localStorage.getItem('familymeal_cloud')||'null');
    if(c){ CLOUD.url=c.url||''; CLOUD.anonKey=c.anonKey||''; CLOUD.family=c.family||''; } }catch(e){}
}
function cloudSaveConfig(){ localStorage.setItem('familymeal_cloud', JSON.stringify({url:CLOUD.url,anonKey:CLOUD.anonKey,family:CLOUD.family})); }
function cloudShareLink(){ return location.origin+location.pathname+'#cfg='+b64enc({url:CLOUD.url,anonKey:CLOUD.anonKey,family:CLOUD.family}); }

async function cloudInit(){
  cloudLoadConfig();
  if(!CLOUD.url || !CLOUD.anonKey || !CLOUD.family){ setCloudStatus('local'); return; }
  try{
    setCloudStatus('connecting');
    const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm');
    CLOUD.client = createClient(CLOUD.url, CLOUD.anonKey);
    await cloudPull();
    cloudSubscribe();
    setCloudStatus('synced');
  }catch(e){ console.error(e); setCloudStatus('offline'); }
}
async function cloudPull(){
  if(!CLOUD.client) return;
  const { data, error } = await CLOUD.client.from('spaces').select('data').eq('family',CLOUD.family).maybeSingle();
  if(error){ console.error(error); setCloudStatus('offline'); return; }
  if(data && data.data){ cloudAdopt(data.data); }   // la nube es la copia maestra al conectar
  else { await cloudPush(true); }                    // primera vez: sube lo que hay localmente
  setCloudStatus('synced');
}
function cloudAdopt(remote){
  try{ DATA = remote; ensureDataFields(); localStorage.setItem(STORE_KEY, JSON.stringify(DATA)); render(); }
  catch(e){ console.error(e); }
}
function cloudPush(immediate){
  if(!CLOUD.client) return;
  clearTimeout(cloudPush._t);
  const run = async ()=>{
    try{
      const now = new Date().toISOString();
      const payload = {...DATA, _client:MY_ID, _updatedAt:now};
      const { error } = await CLOUD.client.from('spaces').upsert({ family:CLOUD.family, data:payload, updated_at:now });
      if(error) throw error;
      setCloudStatus('synced');
    }catch(e){ console.error(e); setCloudStatus('offline'); }
  };
  if(immediate) return run();
  cloudPush._t = setTimeout(run, 600);
}
function cloudSubscribe(){
  if(!CLOUD.client) return;
  CLOUD.client.channel('sp_'+CLOUD.family)
    .on('postgres_changes', { event:'*', schema:'public', table:'spaces', filter:'family=eq.'+CLOUD.family },
      (payload)=>{ const nd = payload.new && payload.new.data; if(!nd) return;
        if(nd._client===MY_ID) return;            // ignorar mis propios cambios
        cloudAdopt(nd); toast('Actualizado por la familia ☁️'); })
    .subscribe();
}
async function cloudConnect(url, anonKey){
  CLOUD.url=(url||'').trim().replace(/\/+$/,''); CLOUD.anonKey=(anonKey||'').trim();
  if(!CLOUD.url || !CLOUD.anonKey){ toast('Faltan los datos de Supabase'); return; }
  if(!CLOUD.family) CLOUD.family = uid('fam')+uid('').slice(0,6); // espacio familiar único e impredecible
  cloudSaveConfig();
  UI.cloudForm={url:CLOUD.url,anonKey:CLOUD.anonKey};  // mantener abierto para mostrar el enlace
  await cloudInit();
  if(CLOUD.status==='synced') toast('¡Sincronización activada! ☁️');
}
function cloudDisconnect(){
  localStorage.removeItem('familymeal_cloud');
  CLOUD.url=''; CLOUD.anonKey=''; CLOUD.family=''; CLOUD.client=null;
  UI.cloudForm=null; setCloudStatus('local'); toast('Sincronización desactivada (sigue guardando en este dispositivo)');
}

/* ---------- arranque ---------- */
load();
render();
cloudInit();
</script>
